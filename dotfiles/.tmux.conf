set -g prefix C-Space
set -g mouse on

set -g focus-events on
set -sa terminal-features ',alacritty:RGB'
set -sg escape-time 0

bind b run-shell 'if [ "$(tmux show -gv status)" = "off" ]; then tmux set -g status on; else tmux set -g status off; fi'

set -g status-style "bg=default fg=white"
set -g status-position top
set -g status-right ""
# Window = just the name (dir basename). Bold when current. Claude marker:
#   @claude_state active  -> " (c)"        (a Claude session is running here)
#   @claude_state pending -> green + "(c)" (Claude is waiting on you)
set -g window-status-format         "#{?#{==:#{@claude_state},pending},#[fg=green],}#W#{?@claude_state, (c),}#[default]"
set -g window-status-current-format "#[bold]#{?#{==:#{@claude_state},pending},#[fg=green],}#W#{?@claude_state, (c),}#[default]"
set -g status-left "[#S] "

# Unlabeled windows: name = basename of the current dir (instead of the process).
# A manual rename (prefix t) turns auto-rename off for that window, so labels stick.
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# Status bar shows only when a session has more than one window.
# Hooks keep it live as windows come and go...
set-hook -g window-linked   'if -F "#{>:#{session_windows},1}" "set -g status on" "set -g status off"'
set-hook -g window-unlinked 'if -F "#{>:#{session_windows},1}" "set -g status on" "set -g status off"'
# ...and this evaluates it on every source (startup + `prefix r`), so reloads
# don't wrongly hide the bar. Must run AFTER the hooks are defined.
if-shell -F "#{>:#{session_windows},1}" "set -g status on" "set -g status off"

set -g pane-border-style fg="#1F1F28"
set -g pane-active-border-style fg="#1F1F28"

bind-key -n M-o split-window -h
bind-key -n M-p split-window -v
bind-key -n M-f resize-pane -Z

# Label the current window (persists via resurrect; stops auto-rename for it).
# prefix t (overrides the default clock-mode binding, which is rarely used).
bind-key t command-prompt -I "#W" "rename-window '%%'"

bind-key -n M-q selectw -t 0
bind-key -n M-w selectw -t 1
bind-key -n M-e selectw -t 2
bind-key -n M-r selectw -t 3

bind-key -T copy-mode-vi "M-h" select-pane -L
bind-key -T copy-mode-vi "M-j" select-pane -D
bind-key -T copy-mode-vi "M-k" select-pane -U
bind-key -T copy-mode-vi "M-l" select-pane -R

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
        | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n "C-p" if-shell "$is_vim" "send-keys C-p" "send-keys 'fcd' C-m"

bind-key -n "M-h" if-shell "$is_vim" "send-keys M-h" "select-pane -L"
bind-key -n "M-j" if-shell "$is_vim" "send-keys M-j" "select-pane -D"
bind-key -n "M-k" if-shell "$is_vim" "send-keys M-k" "select-pane -U"
bind-key -n "M-l" if-shell "$is_vim" "send-keys M-l" "select-pane -R"
bind-key -n "C-\\" if-shell "$is_vim" "send-keys C-\\\\"  "select-pane -l"

bind-key r source-file ~/.tmux.conf \; display-message "reload..."

# TPM
set -g @plugin 'tmux-plugins/tpm'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
# Interval saving is handled by a systemd --user timer (tmux-resurrect-save.timer)
# instead of continuum's status-bar hook, since `status off` prevents that hook
# from ever firing. This just disables continuum's own periodic save.
set -g @continuum-save-interval '0'

run '~/.tmux/plugins/tpm/tpm'
