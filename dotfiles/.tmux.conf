set -g prefix C-Space
set -g mouse on

set -g focus-events on
set -sa terminal-features ',alacritty:RGB'
set -sg escape-time 0

bind b run-shell 'if [ "$(tmux show -gv status)" = "off" ]; then tmux set -g status on; else tmux set -g status off; fi'

set -g status-style "bg=default fg=white"
set -g status-position top
set -g status-right ""
# Window name = dir basename. Bold+underline when current. When a Claude session
# is here, the WHOLE label is coloured by state:
#   active  -> grey   (working, or you've read it)
#   pending -> yellow (unread: Claude wants your input)
#   done    -> green  (unread: Claude finished its work)
# Focusing the window resets it to grey (see pane-focus-in hook below).
set -g window-status-format         "#{?@claude_state,#{?#{==:#{@claude_state},pending},#[fg=yellow],#{?#{==:#{@claude_state},done},#[fg=green],#[fg=colour244]}}#W#[default],#W}"
set -g window-status-current-format "#[bold,underscore]#{?@claude_state,#{?#{==:#{@claude_state},pending},#[fg=yellow],#{?#{==:#{@claude_state},done},#[fg=green],#[fg=colour244]}}#W,#W}#[default]"
# Session shown as [<digit>:name]; the digit is the session's position in
# `tmux ls` order and matches the M-<n> switch bindings below.
# status-left-length must exceed the label width or tmux truncates it
# (default 10 was eating the trailing space).
set -g status-left "[#(tmux ls -F '##S' | grep -nxF '#S' | cut -d: -f1):#S] "
set -g status-left-length 40

# Unlabeled windows: name = basename of the current dir (instead of the process).
# A manual rename (via :rename-window) turns auto-rename off for that window.
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# Status bar shows only when a session has more than one window.
# Hooks keep it live as windows come and go...
set-hook -g window-linked   'if -F "#{>:#{session_windows},1}" "set -g status on" "set -g status off"'
set-hook -g window-unlinked 'if -F "#{>:#{session_windows},1}" "set -g status on" "set -g status off"'
# ...and this evaluates it on every source (startup + `prefix r`), so reloads
# don't wrongly hide the bar. Must run AFTER the hooks are defined.
if-shell -F "#{>:#{session_windows},1}" "set -g status on" "set -g status off"

# Focusing a window "reads" its Claude marker -> grey (only if a marker is set,
# i.e. a Claude session is in this window). This is the read/unread reset.
set-hook -g pane-focus-in "if -F \"#{@claude_state}\" \"set -w @claude_state active\""

set -g pane-border-style fg="#1F1F28"
set -g pane-active-border-style fg="#1F1F28"

# Splits inherit the current pane's working directory.
bind-key -n M-o split-window -h -c "#{pane_current_path}"
bind-key -n M-p split-window -v -c "#{pane_current_path}"
bind-key -n M-f resize-pane -Z

# Create: prefix w = new window, prefix s = new (named) session. prefix c freed.
unbind-key c
bind-key w new-window
bind-key s command-prompt -p "new session:" "new-session -s '%%'"

bind-key -n M-q selectw -t 0
bind-key -n M-w selectw -t 1
bind-key -n M-e selectw -t 2
bind-key -n M-r selectw -t 3
bind-key -n M-t selectw -t 4
bind-key -n M-y selectw -t 5
bind-key -n M-u selectw -t 6
bind-key -n M-i selectw -t 7

# Switch sessions with Alt+<n>: M-<n> -> n-th session in `tmux ls` order
# (alphabetical, so it works with named sessions and matches the status digit).
bind-key -n M-1 run-shell 't=$(tmux ls -F "##S" | sed -n 1p); [ -n "$t" ] && tmux switch-client -t "=$t" || true'
bind-key -n M-2 run-shell 't=$(tmux ls -F "##S" | sed -n 2p); [ -n "$t" ] && tmux switch-client -t "=$t" || true'
bind-key -n M-3 run-shell 't=$(tmux ls -F "##S" | sed -n 3p); [ -n "$t" ] && tmux switch-client -t "=$t" || true'
bind-key -n M-4 run-shell 't=$(tmux ls -F "##S" | sed -n 4p); [ -n "$t" ] && tmux switch-client -t "=$t" || true'
bind-key -n M-5 run-shell 't=$(tmux ls -F "##S" | sed -n 5p); [ -n "$t" ] && tmux switch-client -t "=$t" || true'
bind-key -n M-6 run-shell 't=$(tmux ls -F "##S" | sed -n 6p); [ -n "$t" ] && tmux switch-client -t "=$t" || true'

# Session menu (overrides default mark-pane on prefix m).
bind-key m choose-tree -Zs

bind-key -T copy-mode-vi "M-h" select-pane -L
bind-key -T copy-mode-vi "M-j" select-pane -D
bind-key -T copy-mode-vi "M-k" select-pane -U
bind-key -T copy-mode-vi "M-l" select-pane -R

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
        | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n "C-p" if-shell "$is_vim" "send-keys C-p" "send-keys 'fcd' C-m"

bind-key -n "M-h" if-shell "$is_vim" "send-keys M-h" "select-pane -L"
bind-key -n "M-j" if-shell "$is_vim" "send-keys M-j" "select-pane -D"
bind-key -n "M-k" if-shell "$is_vim" "send-keys M-k" "select-pane -U"
bind-key -n "M-l" if-shell "$is_vim" "send-keys M-l" "select-pane -R"
bind-key -n "C-\\" if-shell "$is_vim" "send-keys C-\\\\"  "select-pane -l"

bind-key r source-file ~/.tmux.conf \; display-message "reload..."

# TPM
set -g @plugin 'tmux-plugins/tpm'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
# Interval saving is handled by a systemd --user timer (tmux-resurrect-save.timer)
# instead of continuum's status-bar hook, since `status off` prevents that hook
# from ever firing. This just disables continuum's own periodic save.
set -g @continuum-save-interval '0'

run '~/.tmux/plugins/tpm/tpm'
